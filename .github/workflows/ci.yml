name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zeiterfassung_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run shared:build

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/zeiterfassung_test

      - name: Build API
        run: npm run api:build

      - name: Run migrations
        run: npx --workspace=apps/api prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/zeiterfassung_test

      # - name: Run tests
      #   run: npm test
      #   env:
      #     DATABASE_URL: postgresql://test:test@localhost:5432/zeiterfassung_test
      #     JWT_SECRET: test-secret-do-not-use-in-prod
