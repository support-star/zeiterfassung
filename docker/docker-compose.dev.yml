version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zeiterfassung}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zeiterfassung_dev}
      POSTGRES_DB: ${POSTGRES_DB:-zeiterfassung}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zeiterfassung}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
